<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Logisitc Regression</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="text-white">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <div class="container">
        <header class="border-bottom lh-1 py-3">
            <div class="row flex-nowrap justify-content-between align-items-center">
                <div class="col-3 pt-1">
                    <h6>Watch</h6>
                </div>
                <div class="col-6 text-center">
                    <h5 class="blog-header-logo text-decoration-none">
                        Nodex Secure Software
                    </h5>
                </div>
                <div class="col-3 text-center align-items-center">
                    <a class="link-secondary" href="#">Sign up</a>
                </div>
            </div>
        </header>
    </div>

   <div class="nav-scroller py-1 mb-3 border-bottom">
        <nav class="nav nav-underline justify-content-between">
            <a class="nav-item nav-link-body-emphasis" href="{{ url_for('home')}}">Home</a>
            <a class="nav-item nav-link-body-emphasis active" href="{{ url_for('use_cases')}}">Use Cases</a>
            <a class="nav-item nav-link-body-emphasis" href="{{ url_for('form')}}">Linear Regression</a>
            
        </nav>
    </div>
    <div class="row flex-nowrap justify-content-between align-items-center border rounded p4 shadows-sm">

        <form method="POST">
        <input type="number" step="0.01" name="price" placeholder="Price" required>
        <br>

        <input type="number" name="reviews" placeholder="Number of Reviews" required>
        <br>

        <select name="brand" required>
            <option value="">Select Brand</option>
            <option value="Casio">Casio</option>
            <option value="Titan">Titan</option>
            <option value="Seiko">Seiko</option>
            <option value="Citizen">Citizen</option>
            <option value="TIMEX">Timex</option>
        </select>
        <br>

        <button type="submit">Predict</button>
    </form>
    </div>

    <div class="row flex-nowrap justify-content-between align-items-center border rounded p4 shadows-sm" >
         {% if result is not none %}
        <div class="result">
            <p><strong>Prediction:</strong> 
                {% if result == 1 %}
                     Good Rating
                {% else %}
                     Low Rating
                {% endif %}
            </p>

            <p><strong>Probability:</strong> {{ probability }}</p>
        </div>
    {% endif %}
    </div>
    
        

</body>
</html>
