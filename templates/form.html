<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calories Prediction</title>
</head>
<body>

    <h1>Calories Prediction</h1>

    <form method="post">
        <label>Exercise Duration (minutes):</label>
        <input type="number" name="duration" required>
        <br><br>

        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <h2>Estimated Calories: {{ result }}</h2>
    {% endif %}

</body>
</html>
