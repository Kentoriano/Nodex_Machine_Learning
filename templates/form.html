<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Calories Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <div class="container">
        <header class=" border-button 1h-1 py-3">
            <div class="row flex-nowrap justify-content-between align-items-center">
                <div class="col-3 pt-1">
                    <h6>Lineal Regression</h6>
                </div>
                <div class="col-6 text-center">
                    <a class="blog-header-logo text-body-emphasis text-decoration-none" href="#">Machine Cases</a>
                </div>
                <div class="col-3 d-flex justify-content-end align-items-center">
                    <a class="link-secundary" href="#" aria-label="Search">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" 
                        stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                        class="mx-3" role="img" viewBox="0 0 24 24">
                            <title>Search</title>
                            <circle cx="10.5" cy="10.5" r="7.5"></circle>
                            <path d="M21 21l-5.2-5.2"></path>
                        </svg>
                    </a>
                    <a class="link-secondary" href="#">Sign up</a>
                </div>
            </div>
        </header>
    </div>
    <div class="nav-scroller py-1 mb-3 border-bottom">
                    <nav class="nav nav-underline justify-content-between">
                        <a class="nav-item nav-link-body-emphasis active" href="{{ url_for('home')}}">Home</a>
                        <a class="nav-item nav-link-body-emphasis" href="{{ url_for('use_cases')}}">Use Cases</a>
                        <a class="nav-item nav-link-body-emphasis" href="{{ url_for('home')}}">Logistic Regression</a>                    
                    </nav>
    </div>

    <div class="container">
        <div class = "border rounded p-4 shadow-sm">
            <h4>Calories Prediction</h4>
            <form method="post">
                <label>Exercise Duration (minutes):</label>
                <input type="number" name="duration" required>
                <br><br>
                <button type="submit">Predict</button>
            </form>
        </div>
    </div>
    
    <div class="container mt-5">
        <div class="border border-ligth rounded-4 shadow text-center">
            {% if result %}
            <h2>Estimated Calories:</h2>
            <h3> {{result}}</h3>
            {% endif %}
        </div>

    </div>
</body>
</html>
